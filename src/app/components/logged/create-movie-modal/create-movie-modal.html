<div class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <a href="/home" class="back-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                </svg>
            </a>
            <img src="/logo.png" alt="MOVIEFLX" class="modal-logo">
        </div>
        
        <div class="modal-content">
            <h2 class="form-title">Cadastre seu filme aqui</h2>
            
            <form class="movie-form">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Nome do filme">
                    </div>
                    <div class="col-md-6">
                        <textarea class="form-control" rows="1" placeholder="Descrição do filme"></textarea>
                    </div>
                </div>
                
                <div class="row g-3 mt-2">
                    <div class="col-md-6">
                        <div class="input-with-icon">
                            <input type="date" class="form-control" placeholder="Data de lançamento">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="input-icon" viewBox="0 0 16 16">
                                <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-with-icon">
                            <input type="text" class="form-control" placeholder="Avaliação geral">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="input-icon" viewBox="0 0 16 16">
                                <path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <div class="row g-3 mt-2">
                    <div class="col-md-6">
                        <div class="select-with-icon">
                            <select class="form-select">
                                <option selected>Aonde está disponível?</option>
                                <option value="netflix">Netflix</option>
                                <option value="prime">Prime Video</option>
                                <option value="disney">Disney+</option>
                                <option value="hbo">HBO Max</option>
                                <option value="claro">Claro TV</option>
                                <option value="globoplay">Globoplay</option>
                                <option value="apple">Apple TV+</option>
                            </select>
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="select-icon" viewBox="0 0 16 16">
                                <path d="m2 5 6 6 6-6"/>
                            </svg>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="select-with-icon">
                            <select class="form-select">
                                <option selected>Qual categoria</option>
                                <option value="acao">Ação</option>
                                <option value="aventura">Aventura</option>
                                <option value="comedia">Comédia</option>
                                <option value="drama">Drama</option>
                                <option value="terror">Terror</option>
                                <option value="ficcao">Ficção Científica</option>
                                <option value="romance">Romance</option>
                            </select>
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="select-icon" viewBox="0 0 16 16">
                                <path d="m2 5 6 6 6-6"/>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-danger btn-lg px-5">Cadastrar filme</button>
                </div>
            </form>
        </div>
    </div>
</div>
