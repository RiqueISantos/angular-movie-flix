<div id="sign-in-container" class="container">
    <div class="row justify-content-center">
        <div class="col-12">
            <h1 class="text-center mb-4">Entre na sua conta</h1>
            
            <form>
                <div class="mb-3">
                    <input type="email" class="form-control form-control-lg" placeholder="E-mail ou número de telefone" />
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control form-control-lg" placeholder="Sua senha" />
                </div>
                
                <button type="submit" class="btn btn-danger btn-lg w-100 mt-3">Entrar na conta</button>
            </form>
            
            <div class="text-end mt-3">
                <a href="#" class="text-white text-decoration-none forgot-password">Esqueci a senha</a>
            </div>
            
            <p class="text-center mt-4 signup-link">
                <span class="text-white">Novo por aqui? </span> <a href="/cadastre-se" class="text-danger text-decoration-none fw-bold">Assine agora</a>
            </p>
        </div>
    </div>
</div>
